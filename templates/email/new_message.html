<!DOCTYPE html>
<html lang="az">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yeni mesaj</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #f5f5f5; margin: 0; padding: 0; }
        .email-container { max-width: 600px; margin: 40px auto; background-color: #ffffff; padding: 24px; border-radius: 8px; box-shadow: 0 0 10px rgba(0, 0, 0, 0.1); }
        .content { font-size: 16px; color: #333333; line-height: 1.6; }
        .preview { margin: 16px 0; padding: 14px 16px; background: #f3f5fb; border-left: 4px solid #0047ab; border-radius: 6px; color: #444; }
        .footer { margin-top: 28px; font-size: 12px; color: #888888; text-align: center; }
        .btn { display: inline-block; padding: 10px 20px; margin-top: 8px; background-color: #0047ab; color: #ffffff; text-decoration: none; border-radius: 5px; font-weight: bold; }
    </style>
</head>

<body>
    <div class="email-container">
        <div class="content">
            <h2>Yeni mesaj</h2>
            <p><strong>{{ sender_name }}</strong> sizə yeni mesaj göndərdi:</p>
            <div class="preview">{{ preview }}</div>
            <div style="text-align: center;">
                <a href="http://e-grant.aztu.edu.az" class="btn">Mesajı aç</a>
            </div>
        </div>
        <div class="footer">
            © Azərbaycan Texniki Universiteti · AzTU E-Qrant
        </div>
    </div>
</body>

</html>
